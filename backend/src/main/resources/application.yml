spring:
  profiles:
    default: local

  datasource:
    url: datasource_url
    username: datasource_username
    password: datasource_password
    driver-class-name: org.postgresql.Driver
#    hikari:
#      keepalive-time: 60000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        generate_statistics: false
        default_batch_fetch_size: 100

server:
  servlet:
    session:
      timeout: 24h

app:
  password: 1234
  cors-origin: http://localhost:3000

logging:
  level:
    org:
      hibernate.SQL: DEBUG
